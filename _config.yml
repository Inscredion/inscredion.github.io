#
# Site Configuration
#

# 你的名字
name: Chi Zhang （inscredioin）

# 简短的学术头衔
description: PhD Student / Researcher in [Your Field] at Xiamen University

# 你的头像地址 (建议换成你自己的照片)
avatar: https://raw.githubusercontent.com/barryclark/jekyll-now/master/images/jekyll-logo.png

# 社交链接
footer-links:
  email: inscredion@stu.xmu.edu.cn
  github: inscredion
  linkedin: # 建议填入你的领英用户名
  twitter: # 建议填入你的推特用户名
  scholar: # 建议填入你的 Google Scholar 链接
  rss: true

# 个人网站配置
# 你的 GitHub Pages 地址
url: "https://inscredion.github.io"
baseurl: ""

# 评论与统计 (可选)
disqus:
google_analytics:

# 后面保持默认即可
permalink: /:title/
version: v1.2.0
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
sass:
  style: :expanded
gems:
  - jekyll-sitemap
  - jekyll-feed
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME
